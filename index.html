<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>辨別聲調</title>
<style>
  :root{
    --bg:#faf7f2; --ink:#20242a; --muted:#8a8f98; --line:#cdd0d4; --tone:#e23b7d;
    --card:#ffffff; --border:#e7e2d9; --accent:#0e7c86; --accent-ink:#fff;
    --ok:#1f9d57; --no:#f5921e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{background:var(--bg); color:var(--ink);
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC","Hiragino Sans GB",sans-serif;
    overflow:hidden; user-select:none; -webkit-user-select:none;}
  .screen{position:fixed; inset:0; display:none; flex-direction:column;
    padding:max(10px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));}
  .screen.on{display:flex;}
  .bar{display:flex; align-items:center; gap:12px; padding:clamp(10px,1.6vh,18px) clamp(14px,2vw,28px);}
  .bar .spacer{flex:1;}
  .iconbtn{border:1.5px solid var(--border); background:var(--card); color:var(--ink);
    border-radius:14px; padding:10px 16px; font-size:clamp(15px,2.2vh,20px); cursor:pointer; font-weight:500;}
  .iconbtn:active{transform:scale(.96);}
  .score{font-size:clamp(15px,2.4vh,22px); color:var(--muted); font-variant-numeric:tabular-nums;}
  .score b{color:var(--ink);} .score .ok{color:var(--ok);} .score .no{color:var(--no);}
  .pills{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .pill{border:1.5px solid var(--border); background:var(--card); color:var(--muted);
    border-radius:999px; padding:8px 18px; font-size:clamp(14px,2vh,19px); cursor:pointer; font-weight:500;}
  .pill.on{background:var(--accent); color:#fff; border-color:var(--accent);}

  #home{align-items:center; justify-content:center; text-align:center;}
  #home .title{font-size:clamp(40px,9vh,96px); font-weight:700; letter-spacing:.08em; margin-bottom:clamp(20px,5vh,56px);}
  .menu{display:flex; gap:clamp(16px,3vw,40px); flex-wrap:wrap; justify-content:center; padding:0 16px;}
  .menu-card{width:clamp(180px,24vw,300px); aspect-ratio:1/1; background:var(--card);
    border:2px solid var(--border); border-radius:28px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    transition:transform .12s, border-color .12s;}
  .menu-card:hover{border-color:var(--accent);} .menu-card:active{transform:scale(.97);}
  .menu-card .name{font-size:clamp(24px,4.4vh,44px); font-weight:700;}
  .menu-card .sub{font-size:clamp(13px,2vh,18px); color:var(--muted); letter-spacing:.05em;}
  .menu-card svg{width:62%; height:auto;}

  .stage{flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(12px,2.2vh,28px); padding:0 clamp(8px,2vw,28px) clamp(10px,2vh,22px);}
  .play-row{display:flex; gap:clamp(16px,3vw,34px); flex-wrap:wrap; justify-content:center; width:100%;}
  .playbtn{background:var(--accent); color:var(--accent-ink); border:none; border-radius:20px;
    padding:clamp(14px,2.4vh,22px) clamp(24px,3.4vw,46px); font-size:clamp(20px,3.6vh,38px);
    font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:12px; white-space:nowrap;}
  .playbtn.alt{background:var(--card); color:var(--ink); border:2px solid var(--border);}
  .playbtn:active{transform:scale(.97);} .playbtn .tri{font-size:.8em;}

  .options{display:grid; grid-template-columns:1fr 1fr; gap:clamp(14px,2.2vw,30px); width:min(94vw,1100px);}
  .option{position:relative; background:var(--card); border:2.5px solid var(--border); border-radius:22px;
    padding:clamp(8px,1.4vh,16px); cursor:pointer; display:flex; align-items:center; justify-content:center;
    min-height:clamp(90px,16vh,180px); transition:border-color .1s, transform .1s;}
  .option:hover{border-color:var(--accent);} .option:active{transform:scale(.985);}
  .option svg{width:100%; height:100%;}
  .option .mark{position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    font-size:clamp(70px,18vh,180px); font-weight:800; pointer-events:none;}
  .option.correct{border-color:var(--ok);} .option.wrong{border-color:var(--no);}
  .option.correct .mark.ok{display:flex; color:var(--ok);}
  .option.wrong .mark.no{display:flex; color:var(--no);}
  .options.locked .option{cursor:default;}
  .nextbtn{background:var(--ink); color:#fff; border:none; border-radius:16px;
    padding:clamp(12px,2vh,20px) clamp(30px,4vw,56px); font-size:clamp(18px,3vh,30px);
    font-weight:600; cursor:pointer; visibility:hidden;}
  .nextbtn.show{visibility:visible;} .nextbtn:active{transform:scale(.97);}

  #draw .stage{justify-content:flex-start; padding-top:clamp(8px,2vh,22px); gap:clamp(16px,3.5vh,40px);}
  .answer{width:min(96vw,1100px); background:var(--card); border:2.5px dashed var(--border);
    border-radius:22px; display:flex; min-height:clamp(130px,27vh,280px); overflow:hidden;}
  .slot{flex:1; position:relative; cursor:pointer; min-width:0; border-right:1px solid var(--line);}
  .slot:last-child{border-right:none;} .slot.over{background:#eef7f8;}
  .slot svg{width:100%; height:100%; display:block;}
  .palette{display:flex; gap:clamp(10px,1.6vw,22px); flex-wrap:wrap; justify-content:center;}
  .tile{width:clamp(96px,12vw,150px); height:clamp(74px,11vh,120px); background:var(--card);
    border:2px solid var(--border); border-radius:18px; cursor:grab; touch-action:none;
    display:flex; align-items:center; justify-content:center;}
  .tile:active{cursor:grabbing;} .tile svg{width:100%; height:100%; pointer-events:none;}
  .ghost{position:fixed; z-index:99; pointer-events:none; opacity:.92;
    width:clamp(96px,12vw,150px); height:clamp(74px,11vh,120px); background:var(--card);
    border:2px solid var(--accent); border-radius:18px; display:flex; align-items:center; justify-content:center;}
  .ghost svg{width:100%;height:100%;}
  .draw-feedback{position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    font-size:clamp(120px,30vh,360px); font-weight:800; pointer-events:none; z-index:80;}
</style>
</head>
<body>

<section id="home" class="screen on">
  <div class="title">辨別聲調</div>
  <div class="menu">
    <div class="menu-card" data-go="two"><svg viewBox="0 0 240 150" id="ic2"></svg><div class="name">雙音節</div><div class="sub">二聲節聽辨</div></div>
    <div class="menu-card" data-go="four"><svg viewBox="0 0 480 150" id="ic4"></svg><div class="name">四音節</div><div class="sub">四聲節聽辨</div></div>
    <div class="menu-card" data-go="draw"><svg viewBox="0 0 360 150" id="icD"></svg><div class="name">自己畫</div><div class="sub">聽詞拼調</div></div>
  </div>
</section>

<section id="listen" class="screen">
  <div class="bar">
    <button class="iconbtn" data-back>&#8592; 返回</button>
    <div class="pills" id="regPills">
      <button class="pill" data-r="低">低音</button>
      <button class="pill on" data-r="高">高音</button>
    </div>
    <div class="spacer"></div>
    <div class="score">正答 <b class="ok" id="sOk">0</b> · 誤答 <b class="no" id="sNo">0</b> · 答題 <b id="sN">0</b></div>
  </div>
  <div class="stage">
    <div class="play-row">
      <button class="playbtn" id="playL"><span class="tri">&#9654;</span> 快速</button>
      <button class="playbtn alt" id="slowL"><span class="tri">&#9654;</span> 慢速</button>
    </div>
    <div class="options" id="optList"></div>
    <button class="nextbtn" id="nextL">下一題 &#8594;</button>
  </div>
</section>

<section id="draw" class="screen">
  <div class="bar">
    <button class="iconbtn" data-back>&#8592; 返回</button>
    <button class="playbtn alt" id="playD" style="padding:10px 24px; font-size:clamp(16px,2.4vh,22px);"><span class="tri">&#9654;</span> 快速</button>
    <button class="playbtn alt" id="slowD" style="padding:10px 20px; font-size:clamp(15px,2.2vh,20px);"><span class="tri">&#9654;</span> 慢速</button>
    <div class="spacer"></div>
    <div class="score">對 <b class="ok" id="dOk">0</b> · 錯 <b class="no" id="dNo">0</b></div>
  </div>
  <div class="stage">
    <div class="answer" id="answer"></div>
    <div class="palette" id="palette"></div>
    <div class="play-row">
      <button class="nextbtn show" id="nextD" style="background:var(--accent);">下一題 &#8594;</button>
    </div>
  </div>
</section>
<div class="draw-feedback" id="drawFb"></div>

  if(tone===2){const y0=yLevel(2.7),y1=yLevel(4.8),cxm=(x0+x1)/2,cym=yLevel(2.9);const ang=Math.atan2(y1-cym,x1-cxm);
    return `<path d="M${x0} ${y0} Q ${cxm} ${cym} ${x1} ${y1}" fill="none"/>`+arrowHead(x1,y1,ang,S);}
  if(tone===3){const yb=yLevel(1.15),yt=yLevel(2.2);return `<path d="M${x0} ${yt} L ${x0+12} ${yb} L ${x1} ${yb}" fill="none"/>`+arrowHead(x1,yb,0,S);}
  if(tone===4){const y0=yLevel(5),y1=yLevel(1),ang=Math.atan2(y1-y0,x1-x0);return `<line x1="${x0}" y1="${y0}" x2="${x1}" y2="${y1}"/>`+arrowHead(x1,y1,ang,S);}
  if(tone===5){const y=yLevel(NEUTRAL_H[prevTone]||2.5),cxm=(x0+x1)/2;return `<circle cx="${cxm}" cy="${y}" r="9" fill="currentColor" stroke="none"/>`;}
  return '';}
function staffLines(W){let s='';for(let l=1;l<=5;l++){const y=yLevel(l);s+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="var(--line)" stroke-width="2"/>`;}return s;}
function staffInner(tones,color){const W=tones.length*COL_W;let s=staffLines(W);
  s+=`<g stroke="${color||'var(--tone)'}" color="${color||'var(--tone)'}" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">`;
  let prev=1; tones.forEach((t,i)=>{s+=glyph(t,i*COL_W,prev); if(t!==5)prev=t;}); s+='</g>'; return s;}
function staffSVG(tones,color){const W=tones.length*COL_W;
  return `<svg viewBox="0 0 ${W} ${SVG_H}" preserveAspectRatio="xMidYMid meet">${staffInner(tones,color)}</svg>`;}
// 單格（slot 用）：可指定該格的前一聲調與顏色，空格只畫線
function oneSlotSVG(tone,prevTone,color){
  let g='';
  if(tone){ g=`<g stroke="${color||'var(--tone)'}" color="${color||'var(--tone)'}" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">${glyph(tone,0,prevTone||1)}</g>`; }
  return `<svg viewBox="0 0 ${COL_W} ${SVG_H}" preserveAspectRatio="xMidYMid meet">${staffLines(COL_W)}${g}</svg>`;
}

/* ---------- 聲音：一律鼻音哼（hmm） ---------- */
let AC=null;
function ac(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); return AC; }
function f0(level,center){ return center*Math.pow(2,(level-3)*3.2/12); }
const CONTOUR={ 1:[[0,4.8],[1,4.8]], 2:[[0,2.8],[1,4.9]], 3:[[0,2.0],[0.45,1.2],[1,1.2]], 4:[[0,5.0],[1,1.0]] };
function levelAt(p,t){for(let i=0;i<p.length-1;i++){const [t0,l0]=p[i],[t1,l1]=p[i+1];if(t<=t1){const k=(t-t0)/(t1-t0||1);return l0+(l1-l0)*k;}}return p[p.length-1][1];}
const NASAL=[[280,1.0],[1000,0.4],[2200,0.12]];
function playOne(tone,when,center,dur,prevTone){
  const A=ac(), isN=(tone===5);
  const pts=isN?[[0,NEUTRAL_H[prevTone]||2.5],[1,NEUTRAL_H[prevTone]||2.5]]:CONTOUR[tone];
  const N=50, freq=new Float32Array(N);
  for(let i=0;i<N;i++) freq[i]=f0(levelAt(pts,i/(N-1)),center);
  const osc=A.createOscillator(); osc.type='sawtooth'; osc.frequency.setValueCurveAtTime(freq,when,dur);
  const master=A.createGain(); const peak=isN?0.10:0.16;
  master.gain.setValueAtTime(0.0001,when);
  master.gain.exponentialRampToValueAtTime(peak,when+0.05);
  master.gain.setValueAtTime(peak,when+Math.max(0.06,dur-0.09));
  master.gain.exponentialRampToValueAtTime(0.0001,when+dur);
  const sum=A.createGain();
  NASAL.forEach(([fc,g])=>{const bp=A.createBiquadFilter();bp.type='bandpass';bp.frequency.value=fc;bp.Q.value=7;
    const fg=A.createGain();fg.gain.value=g;osc.connect(bp);bp.connect(fg);fg.connect(sum);});
  const lp=A.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1300;
  sum.connect(master); master.connect(lp); lp.connect(A.destination);
  osc.start(when); osc.stop(when+dur+0.02);
}
function playTones(tones,{reg='高',slow=false}={}){
  const A=ac(), center=(reg==='高'?240:130), k=slow?3:1; let t=A.currentTime+0.06, prev=1;
  tones.forEach(tone=>{ const isN=tone===5; const dur=(isN?0.26:(tone===3?0.42:0.5))*k;
    playOne(tone,t,center,dur,prev); t+=dur+(slow?0.30:0.12); if(!isN)prev=tone; });
}

/* ---------- 工具 ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
/* 持久化牌堆：整組洗一次、抽完才重洗（隨機不重複），進度存 localStorage，下次接續。
   可傳入 orderFn(items)->索引陣列，自訂出題順序（例如把長詞均勻分散） */
function persistentDeck(key,items,orderFn){
  const gen=orderFn||(its=>shuffle(its.map((_,i)=>i)));
  let order=null,ptr=0;
  function save(){try{localStorage.setItem(key,JSON.stringify({v:items.length,order,ptr}));}catch(e){}}
  function fresh(){order=gen(items);ptr=0;save();}
  try{const raw=localStorage.getItem(key);const o=raw&&JSON.parse(raw);
    if(o&&o.v===items.length&&Array.isArray(o.order)&&o.order.length===items.length){order=o.order;ptr=Math.min(Math.max(o.ptr|0,0),order.length);}else fresh();
  }catch(e){fresh();}
  if(!order)fresh();
  return{draw(){
    if(ptr>=order.length){const last=order[order.length-1];let no=gen(items);if(no.length>1&&no[0]===last){[no[0],no[1]]=[no[1],no[0]];}order=no;ptr=0;}
    const it=items[order[ptr]];ptr++;save();return it;}};
}
function randDistinct(gen,answer,count){const out=[],seen=new Set([answer.join(',')]);let g=0;
  while(out.length<count&&g++<500){const c=gen();const k=c.join(',');if(!seen.has(k)){seen.add(k);out.push(c);}}return out;}

/* ---------- 題庫：雙/四音節 ---------- */
const TWO=(()=>{const a=[];for(let i=1;i<=4;i++)for(let j=1;j<=4;j++)a.push([i,j]);for(let i=1;i<=4;i++)a.push([i,5]);return a;})();
const genTwo=()=>Math.random()<0.2?[1+(Math.random()*4|0),5]:[1+(Math.random()*4|0),1+(Math.random()*4|0)];
const FOUR=(()=>{const a=[];for(let i=1;i<=4;i++)for(let j=1;j<=4;j++)for(let k=1;k<=4;k++)for(let l=1;l<=4;l++)a.push([i,j,k,l]);return a;})();
const genFour=()=>[0,0,0,0].map(()=>1+(Math.random()*4|0));
const deckTwo=persistentDeck('tone_two_v1',TWO);
const deckFour=persistentDeck('tone_four_v1',FOUR);

/* ---------- 畫面切換 ---------- */
const screens={home:home,listen:document.getElementById('listen'),draw:document.getElementById('draw')};
function show(n){Object.values(screens).forEach(s=>s.classList.remove('on'));screens[n].classList.add('on');}
document.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>show('home'));
document.getElementById('ic2').innerHTML=staffInner([1,4]);
document.getElementById('ic4').innerHTML=staffInner([1,2,3,4]);
document.getElementById('icD').innerHTML=staffInner([2,3,5]);
document.querySelectorAll('.menu-card').forEach(c=>c.onclick=()=>{const g=c.dataset.go;
  if(g==='draw'){startDraw();show('draw');} else {startListen(g);show('listen');}});

/* ---------- 聽辨（雙/四音節） ---------- */
let L={mode:'two',deck:null,gen:null,answer:null,locked:false,ok:0,no:0,n:0,reg:'高',wrongThisQ:false};
const optList=document.getElementById('optList');
function startListen(mode){L.mode=mode;L.deck=(mode==='two'?deckTwo:deckFour);L.gen=mode==='two'?genTwo:genFour;
  L.ok=0;L.no=0;L.n=0;updateScore();nextListen();}
function updateScore(){sOk.textContent=L.ok;sNo.textContent=L.no;sN.textContent=L.n;}
function nextListen(){
  L.locked=false; L.wrongThisQ=false; L.answer=L.deck.draw();
  const opts=shuffle([L.answer,...randDistinct(L.gen,L.answer,3)]);
  optList.classList.remove('locked'); optList.innerHTML='';
  opts.forEach(tones=>{const div=document.createElement('div');div.className='option';
    div.dataset.tones=tones.join(','); div.innerHTML=staffSVG(tones)+`<div class="mark ok">&#9675;</div><div class="mark no">&#10005;</div>`;
    div.onclick=()=>answerListen(div,tones); optList.appendChild(div);});
  nextL.classList.remove('show');
  playTones(L.answer,{reg:L.reg});
}
function answerListen(div,tones){ if(L.locked)return; if(div.classList.contains('wrong'))return;
  const key=L.answer.join(',');
  if(tones.join(',')===key){
    L.locked=true; optList.classList.add('locked'); div.classList.add('correct');
    if(!L.wrongThisQ)L.ok++; L.n++; updateScore(); nextL.classList.add('show');
  } else {
    div.classList.add('wrong');
    if(!L.wrongThisQ){L.no++; L.wrongThisQ=true;}
    updateScore();
  }
}
playL.onclick=()=>playTones(L.answer,{reg:L.reg});
slowL.onclick=()=>playTones(L.answer,{reg:L.reg,slow:true});
nextL.onclick=nextListen;
document.querySelectorAll('#regPills [data-r]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#regPills [data-r]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); L.reg=b.dataset.r;});

/* ---------- 自己畫 ---------- */
/* 整副題庫（HSK1~5）一次洗完才重複；分散洗牌：各音節長度均勻散布，避免同長度連續一大串 */
function spreadOrder(items){
  const groups={}; items.forEach((w,i)=>{(groups[w.t.length]=groups[w.t.length]||[]).push(i);});
  const tagged=[];
  Object.values(groups).forEach(g=>{const sh=shuffle(g),n=sh.length;
    sh.forEach((idx,k)=>tagged.push([(k+0.5)/n+Math.random()*1e-6,idx]));});
  tagged.sort((a,b)=>a[0]-b[0]); return tagged.map(t=>t[1]);
}
const deckDraw=persistentDeck('tone_draw_full_v3',BANK,spreadOrder);
function drawWord(){return deckDraw.draw();}
let D={word:null,filled:[],ok:0,no:0,reviewed:false,wrongThisWord:false};
const answerEl=document.getElementById('answer'), paletteEl=document.getElementById('palette');
function buildPalette(){paletteEl.innerHTML='';[1,2,3,4,5].forEach(t=>{
  const tile=document.createElement('div');tile.className='tile';tile.dataset.tone=t;tile.innerHTML=staffSVG([t]);
  paletteEl.appendChild(tile);enableDrag(tile,t);});}
function startDraw(){buildPalette();D.ok=0;D.no=0;dOk.textContent=0;dNo.textContent=0;nextDraw();}
function nextDraw(){D.word=drawWord();D.filled=new Array(D.word.t.length).fill(null);D.reviewed=false;D.wrongThisWord=false;renderSlots();speakWord(D.word,false);}
function prevToneAt(arr,idx){let p=1;for(let k=idx-1;k>=0;k--){if(arr[k]&&arr[k]!==5){p=arr[k];break;}}return p;}
function renderSlots(){answerEl.innerHTML='';
  const ans=D.word.t;
  D.filled.forEach((tone,idx)=>{
    const slot=document.createElement('div');slot.className='slot';slot.dataset.idx=idx;
    if(D.reviewed){ // 對答案後：顯示正解，學生對的綠、錯的紅
      const correctTone=ans[idx]; const okHere=(tone===correctTone);
      slot.innerHTML=oneSlotSVG(correctTone, prevToneAt(ans,idx), okHere?'var(--ok)':'var(--no)');
    } else {
      slot.innerHTML=oneSlotSVG(tone, prevToneAt(D.filled,idx), 'var(--tone)');
      slot.onclick=()=>{if(D.filled[idx]){D.filled[idx]=null;renderSlots();}};
    }
    answerEl.appendChild(slot);
  });
}
function placeTone(tone,idx){if(D.reviewed)return; if(idx==null)idx=D.filled.findIndex(x=>x===null);
  if(idx==null||idx<0)return; D.filled[idx]=tone; renderSlots();}
function enableDrag(tile,tone){let ghost=null,moved=false,sx=0,sy=0;
  tile.addEventListener('pointerdown',e=>{moved=false;sx=e.clientX;sy=e.clientY;tile.setPointerCapture(e.pointerId);
    const mv=ev=>{if(Math.hypot(ev.clientX-sx,ev.clientY-sy)>8){moved=true;if(!ghost){ghost=document.createElement('div');ghost.className='ghost';ghost.innerHTML=staffSVG([tone]);document.body.appendChild(ghost);}}
      if(ghost){ghost.style.left=(ev.clientX-40)+'px';ghost.style.top=(ev.clientY-40)+'px';
        document.querySelectorAll('.slot').forEach(s=>s.classList.remove('over'));
        const el=document.elementFromPoint(ev.clientX,ev.clientY),sl=el&&el.closest('.slot');if(sl)sl.classList.add('over');}};
    const up=ev=>{tile.removeEventListener('pointermove',mv);tile.removeEventListener('pointerup',up);
      if(ghost){ghost.remove();ghost=null;}document.querySelectorAll('.slot').forEach(s=>s.classList.remove('over'));
      if(moved){const el=document.elementFromPoint(ev.clientX,ev.clientY),sl=el&&el.closest('.slot');if(sl)placeTone(tone,+sl.dataset.idx);}
      else{placeTone(tone,null);}};
    tile.addEventListener('pointermove',mv);tile.addEventListener('pointerup',up);});}

/* 念詞語：裝置中文語音 + iOS 解鎖 */
let zhVoice=null,voicesReady=false;
function loadVoices(){const vs=speechSynthesis.getVoices();if(vs.length){voicesReady=true;
  const isZh=v=>/zh|cmn|chinese/i.test(v.lang+' '+v.name);
  const isTW=v=>/zh[-_]?tw|zh[-_]?hant|hant[-_]?tw|cmn[-_]?hant|taiwan|臺灣|台灣|國語/i.test(v.lang+' '+v.name);
  zhVoice=vs.find(isTW)||vs.find(isZh)||null;}}
if('speechSynthesis' in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
let speechUnlocked=false;
function unlock(){if(!speechUnlocked&&'speechSynthesis' in window){speechUnlocked=true;try{const u=new SpeechSynthesisUtterance(' ');u.volume=0;speechSynthesis.speak(u);}catch(e){}}}
document.addEventListener('pointerdown',()=>{unlock();if(AC&&AC.state==='suspended')AC.resume();});
function speakWord(w,slow){if(!('speechSynthesis' in window)||!w)return;if(!voicesReady)loadVoices();
  speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(w.hz);
  if(zhVoice){u.voice=zhVoice;u.lang=zhVoice.lang;}else{u.lang='zh-TW';}
  u.rate=slow?0.5:1.0;u.pitch=1;setTimeout(()=>speechSynthesis.speak(u),60);}
playD.onclick=()=>speakWord(D.word,false);
slowD.onclick=()=>speakWord(D.word,true);
nextD.onclick=()=>{
  if(D.filled.some(x=>x===null))return;          // 還沒每個字都放上聲調，不動作
  const correct=D.filled.join(',')===D.word.t.join(',');
  const fb=document.getElementById('drawFb');
  fb.textContent=correct?'\u25CB':'\u2715';
  fb.style.color=correct?'var(--ok)':'var(--no)'; fb.style.display='flex';
  if(correct){
    if(!D.wrongThisWord){D.ok++;dOk.textContent=D.ok;}
    setTimeout(()=>{fb.style.display='none';nextDraw();},700);   // 對 → 跳下一題
  } else {
    if(!D.wrongThisWord){D.no++;dNo.textContent=D.no;D.wrongThisWord=true;}
    setTimeout(()=>fb.style.display='none',900);                // 錯 → 留在原題，自己改到對
  }
};
</script>
